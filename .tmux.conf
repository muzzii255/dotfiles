# --- General Settings ---
set -g mouse on
setw -g mode-keys vi
set -g base-index 1           # Start windows at 1 instead of 0
set -g escape-time 0          # Faster command sequences

# --- Keybindings (Alt-based) ---

# Alt + w: New Window
bind -n M-w new-window -c "#{pane_current_path}"

# Alt + d: Close Window (Immediate, no panes used)
bind -n M-d kill-window

# Alt + n: Next Window
bind -n M-n next-window

# Alt + z: Copy Mode (Cursor Move)
bind -n M-z copy-mode
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# Space is default for 'begin-selection' in vi-mode

# --- Fix/Cleanup of your Bell & Activity settings ---
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux
# --- Catppuccin-Inspired Styling ---

set-option -g status-interval 5
set-option -g automatic-rename on
# set-option -g automatic-rename-format '#{b:pane_current_path}'
# set-option -g set-titles-string "#I:#W"
# Design Constants (Catppuccin Mocha Palette)
# Surface0: #313244 | Pink: #f5c2e7 | Red: #f38ba8 | Yellow: #f9e2af
run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux
# Copy Mode Colors
setw -g mode-style 'fg=#11111b bg=#f38ba8 bold'

# Message Styles
set -g message-style 'fg=#f9e2af bg=#313244 bold'

# Status Bar Positioning
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=#f38ba8 bg=#181825'

# Left Side (Empty per your request)
set -g status-left ''
set -g status-left-length 10

# Right Side (Date and Time)
set -g status-right-style 'fg=#11111b bg=#f9e2af'
set -g status-right ' %Y-%m-%d %H:%M '
set -g status-right-length 50

# Window Status Formatting
setw -g window-status-current-style 'fg=#11111b bg=#f38ba8 bold'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=#f38ba8 bg=#11111b'
setw -g window-status-format ' #I #[fg=#cdd6f4]#W #[fg=#f9e2af]#F '

setw -g window-status-bell-style 'fg=#f9e2af bg=#f38ba8 bold'

# Clock mode
setw -g clock-mode-colour "#f9e2af"
